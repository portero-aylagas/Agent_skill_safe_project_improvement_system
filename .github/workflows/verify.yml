name: Verify

on:
  pull_request:
  push:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ""
      ANTHROPIC_API_KEY: ""
      GOOGLE_API_KEY: ""
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run verification
        run: make verify
