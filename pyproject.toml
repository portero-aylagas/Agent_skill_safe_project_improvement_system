[tool.ruff]
line-length = 88
target-version = "py311"
extend-exclude = [
    ".venv",
    "venv",
    ".conda",
    "__pycache__",
    "build",
    "dist",
]

[tool.ruff.lint]
select = [
    "E4",
    "E7",
    "E9",
    "F",
    "D100",
    "D101",
    "D102",
    "D103",
    "D107",
]
ignore = []

[tool.ruff.lint.pydocstyle]
convention = "google"
